name: CI — InsureDesk

# ──────────────────────────────────────────────────────────────────────────────
# Automated CD pipeline (no PRs required):
#
#   push to develop
#       │
#       ├─► Unit + API Tests (Jest)    always runs, ~1 min
#       │       └─► Coverage Summary
#       │
#       └─► Full Suite — Stage Jest + Playwright    ~10 min
#               └─► if ALL green → auto-promote develop → main
#                                       │
#                                       ▼
#                           Vercel + Railway auto-deploy to production
#
# Push to main only happens via the auto-promote job above.
# Unit tests re-run on main as a sanity check (no full suite, no promote loop).
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [develop, main]

permissions:
  contents: write   # allows the auto-promote job to push develop → main

# ── Job 1: Unit + API Tests ───────────────────────────────────────────────────
jobs:
  backend-tests:
    name: Unit + API Tests (Jest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Run unit + API tests with coverage
        run: npm run test:ci
        working-directory: backend
        env:
          JWT_SECRET: test-secret-key-insuredesk-ci
          NODE_ENV: test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage/
          retention-days: 14

  # ── Job 2: Coverage Summary ───────────────────────────────────────────────
  coverage-summary:
    name: Coverage Summary
    runs-on: ubuntu-latest
    needs: backend-tests
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Print coverage table
        run: |
          npm run test:ci -- --coverageReporters=text-summary 2>&1 | tail -20
        working-directory: backend
        env:
          JWT_SECRET: test-secret-key-insuredesk-ci
          NODE_ENV: test

  # ── Job 3: Full Suite — Stage Jest + Playwright (develop pushes only) ─────
  full-suite:
    name: Full Suite — Stage Jest + Playwright
    runs-on: ubuntu-latest
    needs: backend-tests
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright + Chromium
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Warm up Railway backend (avoid cold start)
        run: |
          echo "Pinging Railway health endpoint to wake up the server..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://insuredesk-production.up.railway.app/health)
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Railway is awake!"
              break
            fi
            sleep 10
          done

      - name: Run Stage Jest API tests
        run: npm run test:stage
        working-directory: backend
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NODE_ENV: test

      - name: Run Playwright E2E tests
        run: npx playwright test --config playwright.config.stage.js --reporter=list
        working-directory: frontend

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  # ── Job 4: Auto-promote develop → main ───────────────────────────────────
  promote-to-main:
    name: Auto-promote develop → main
    runs-on: ubuntu-latest
    needs: [backend-tests, full-suite]
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push develop → main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push origin HEAD:main
          echo "✅ develop promoted to main — Vercel + Railway will auto-deploy"
