name: CI — Unit & API Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend — Unit + API Tests (Jest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Run unit + API tests with coverage
        run: npm run test:ci
        working-directory: backend
        env:
          JWT_SECRET: test-secret-key-insuredesk-ci
          NODE_ENV: test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage/
          retention-days: 14

  coverage-summary:
    name: Coverage Summary
    runs-on: ubuntu-latest
    needs: backend-tests
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Run tests and print coverage table
        run: |
          npm run test:ci -- --coverageReporters=text-summary 2>&1 | tail -20
        working-directory: backend
        env:
          JWT_SECRET: test-secret-key-insuredesk-ci
          NODE_ENV: test
